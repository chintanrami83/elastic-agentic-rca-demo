# Agent Configuration — Elastic Agentic RCA Demo
# Single rca_agent with 3 ES|QL tools, one per scenario type

agent:
  name: "rca_agent"
  description: "Autonomous Root Cause Analysis agent — analyzes incidents across logs, metrics, traces, and communications"
  llm:
    provider: "anthropic"
    model: "claude-sonnet-4-5"
    temperature: 0.3
    max_tokens: 4096
  settings:
    timeout: 300
    max_iterations: 10

# ── ES|QL Tools ───────────────────────────────────────────────────────────────

tools:
  - name: "rca_inc_change_logs_infra_traces"
    description: >
      Retrieves all data for a given incident ID across incidents, changes,
      application logs, infrastructure logs, APM traces, and communications.
      Use for Scenario 1 (manual RCA — DB connection pool, deployment correlation).
    type: esql
    parameters:
      - name: incident_id
        type: string
        required: true
        description: "ServiceNow incident ID, e.g. INC0012345"
    query: |
      FROM rca-incidents, rca-changes, rca-logs-app, rca-logs-infra,
           rca-traces, rca-comms-teams, rca-comms-email, rca-knowledge
      | WHERE incident_id == ?incident_id
        OR incident_ref == ?incident_id
      | SORT @timestamp ASC
      | LIMIT 500

  - name: "memory_leak_data_retriever"
    description: >
      Retrieves JVM metrics, GC logs, application logs, and alert data
      for a given app. Use for Scenario 2 (alert-driven RCA — memory leak detection).
    type: esql
    parameters:
      - name: app_id
        type: string
        required: true
        description: "Application ID, e.g. APP-9123"
    query: |
      FROM rca-metrics, rca-logs-app, rca-logs-infra,
           rca-changes, rca-alerts, rca-knowledge
      | WHERE app_id == ?app_id
        AND @timestamp >= NOW() - 24h
      | SORT @timestamp ASC
      | LIMIT 500

  - name: "distributed_system_analyzer"
    description: >
      Retrieves data across multiple services for a distributed incident.
      Includes metrics, logs, distributed traces, and communications.
      Use for Scenario 3 (cascading timeout across microservices).
    type: esql
    parameters:
      - name: incident_id
        type: string
        required: true
        description: "Incident ID, e.g. INC0034567"
    query: |
      FROM rca-metrics, rca-logs-app, rca-traces,
           rca-comms-teams, rca-incidents, rca-alerts, rca-knowledge
      | WHERE incident_id == ?incident_id
        OR app_id IN ("APP-9123", "APP-5521", "APP-7654")
      | SORT @timestamp ASC
      | LIMIT 500

# ── Output Format ─────────────────────────────────────────────────────────────

output_format:
  type: "pir_document"
  sections:
    - "Executive Summary"
    - "Incident Timeline"
    - "Root Cause Analysis (5 Whys)"
    - "Impact Assessment"
    - "Preventive Measures"
    - "Lessons Learned"

# ── System Instructions ───────────────────────────────────────────────────────

system_instructions: |
  You are an expert Site Reliability Engineer performing automated Root Cause Analysis.

  For every incident you receive:
  1. Use the appropriate ES|QL tool to retrieve all relevant data
  2. Correlate events temporally — look for changes or deployments before error spikes
  3. For distributed failures, trace backwards from symptoms to root cause:
     - Identify which service degraded first (earliest timestamp)
     - Follow the dependency chain upstream
     - Check for external API or third-party failures
  4. Apply 5 Whys methodology to identify the true root cause
  5. Generate a structured Post-Incident Review (PIR) document

  Always base your analysis on evidence from the data. Cite specific timestamps,
  error messages, and metric values. Do not speculate beyond what the data shows.
