# Elastic RCA Workflow Definition
# Automated Root Cause Analysis using a single rca_agent

name: elastic_rca_workflow
version: 1.0.0
description: Automated Root Cause Analysis — triggered manually or by Kibana alert

# ── Inputs ────────────────────────────────────────────────────────────────────

input:
  incident_id:
    type: string
    description: "Incident ID to analyze (e.g. INC0012345) — used for manual and Scenario 3 triggers"
    required: false
  app_id:
    type: string
    description: "Application ID (e.g. APP-9123) — used for alert-driven Scenario 2 trigger"
    required: false

# ── Steps ─────────────────────────────────────────────────────────────────────

steps:

  # Step 1: AI Agent Analysis
  - id: rca_analysis
    name: "RCA Agent Analysis"
    type: ai.agent
    with:
      agent_id: "rca_agent"
      message: |
        Analyze incident {{ inputs.incident_id }}{{ inputs.app_id }}.
        Retrieve all available data, correlate events, identify root cause,
        and generate a complete Post-Incident Review document.
    timeout: 300s

  # Step 2: Create ServiceNow Incident (via Pipedream)
  - id: create_incident
    name: "Create ServiceNow Incident"
    type: http
    with:
      url: "{{ env.PIPEDREAM_WEBHOOK_URL }}"
      method: POST
      headers:
        Content-Type: "application/json"
      body:
        action: "create_incident"
        incident_id: "{{ inputs.incident_id }}"
        app_id: "{{ inputs.app_id }}"
        rca_summary: "{{ steps.rca_analysis.output }}"
        automated: true
    timeout: 30s
    continue_on_error: true   # Don't block if ServiceNow is unavailable

  # Step 3: Log to Knowledge Base
  - id: log_to_kb
    name: "Log to Knowledge Base"
    type: elasticsearch.index
    with:
      index: "rca-knowledge"
      document:
        incident_id: "{{ inputs.incident_id }}"
        app_id: "{{ inputs.app_id }}"
        rca_completed: true
        automated: true
        timestamp: "{{ now() }}"

# ── Triggers ──────────────────────────────────────────────────────────────────

triggers:
  # Manual trigger — Scenarios 1 and 3
  manual:
    enabled: true
    inputs:
      - incident_id

  # Alert-driven trigger — Scenario 2
  # Configure this in Kibana Alerting: Stack Management → Rules
  # Rule: avg(heap_percent) > 85 over 5 minutes on index rca-metrics
  alert:
    enabled: true
    source: "kibana_alerting"
    inputs:
      - app_id
